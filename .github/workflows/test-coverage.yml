name: Focused Tests and Coverage

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-2022
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore WinForms test project
        run: dotnet restore tests/WileyWidget.WinForms.Tests/WileyWidget.WinForms.Tests.csproj

      - name: Build WinForms test project
        run: dotnet build tests/WileyWidget.WinForms.Tests/WileyWidget.WinForms.Tests.csproj --no-restore --configuration Release

      - name: Test WinForms project with Coverage
        run: |
          dotnet test tests/WileyWidget.WinForms.Tests/WileyWidget.WinForms.Tests.csproj --no-build --configuration Release --filter "Category!=Smoke&Category!=RealAPI&Category!=Expensive" --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/**/coverage.cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
