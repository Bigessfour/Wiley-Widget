name: Trunk Merge Queue helper

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled, unlabeled]

permissions:
  issues: write
  pull-requests: write

jobs:
  process-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Check comment/label context and handle merge-queue commands
        uses: actions/github-script@v6
        env:
          TRUNK_API_URL: ${{ secrets.TRUNK_API_URL }}
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const context = github.context;
            const payload = context.payload;

            function isPr() {
              if (payload.pull_request) return true;
              if (payload.issue && payload.issue.pull_request) return true;
              return false;
            }

            // Only operate on pull requests
            if (!isPr()) {
              console.log('Not a PR event — ignoring');
              return;
            }

            const prNumber = payload.pull_request ? payload.pull_request.number : payload.issue.number;
            const repo = context.repo.repo;
            const owner = context.repo.owner;

            // Determine text to inspect
            let text = '';
            if (payload.comment && payload.comment.body) text = payload.comment.body.toLowerCase();
            if (payload.label && payload.label.name) text = payload.label.name.toLowerCase();

            // commands
            const enterCmd = '/enter-merge-queue';
            const leaveCmd = '/leave-merge-queue';

            async function addLabel() {
              console.log(`Adding label 'trunk-merge-queued' to PR #${prNumber}`);
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['trunk-merge-queued'] });
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: 'PR requested to enter Trunk Merge Queue. If TRUNK_API_URL is configured in repo secrets, an enqueuing request will be sent.' });
            }

            async function removeLabel() {
              console.log(`Removing label 'trunk-merge-queued' from PR #${prNumber}`);
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: 'trunk-merge-queued' });
              } catch (e) {
                console.log('Label not present or remove failed (safe to continue).', e.message);
              }
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: 'PR requested to leave Trunk Merge Queue.' });
            }

            async function callTrunkApi(action) {
              if (!process.env.TRUNK_API_URL) {
                console.log('No TRUNK_API_URL configured in secrets — skipping remote API call.');
                return;
              }
              const url = `${process.env.TRUNK_API_URL.replace(/\/$/, '')}/merge-queue/${action}`;
              console.log(`Calling Trunk API: ${url} for PR #${prNumber}`);

              const token = process.env.TRUNK_API_TOKEN || '';
              const body = { owner, repo, pr: prNumber };
              const headers = { 'Content-Type': 'application/json' };
              if (token) headers['Authorization'] = `Bearer ${token}`;

              try {
                const resp = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
                const text = await resp.text();
                console.log('Trunk API response status:', resp.status, 'body:', text);
              } catch (e) {
                console.log('Failed to call Trunk API:', e.message);
              }
            }

            // Process commands from comment body
            if (text.includes(enterCmd)) {
              await addLabel();
              await callTrunkApi('add');
              return;
            }

            if (text.includes(leaveCmd)) {
              await removeLabel();
              await callTrunkApi('remove');
              return;
            }

            // Process label events — treat adding/removing label 'trunk-merge-queue' as user intent
            if (payload.label && payload.action) {
              const labelName = payload.label.name.toLowerCase();
              if (labelName === 'trunk-merge-queued' && payload.action === 'created') {
                await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: 'PR labeled trunk-merge-queued — it will be considered for merge queue processing.' });
                await callTrunkApi('add');
              }

              if (labelName === 'trunk-merge-queued' && payload.action === 'deleted') {
                await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: 'PR unlabeled trunk-merge-queued — removing from merge queue.' });
                await callTrunkApi('remove');
              }
            }
