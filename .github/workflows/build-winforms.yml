name: CI/CD Dashboard Enhanced (95% Success Target)

on:
  push:
    branches: [main, develop, feature/dashboard-production-ready]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Clear NuGet caches
        run: dotnet nuget locals all --clear

      - name: Restore NuGet packages
        run: dotnet restore ./WileyWidget.sln --verbosity minimal

      - name: Build WinForms Application
        run: dotnet build ./WileyWidget.sln --configuration Release --no-restore --verbosity minimal

      - name: Run Unit Tests
        run: dotnet test WileyWidget.Services.UnitTests/WileyWidget.Services.UnitTests.csproj --configuration Release --no-build --verbosity normal
        continue-on-error: true

      - name: Run Dashboard Service Tests
        run: dotnet test tests/WileyWidget.Services.Tests/WileyWidget.Services.Tests.csproj --filter "FullyQualifiedName~Dashboard" --configuration Release --logger trx --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Run Integration Tests
        run: dotnet test tests/WileyWidget.Services.Tests/WileyWidget.Services.Tests.csproj --configuration Release --no-build --verbosity normal
        continue-on-error: true

      - name: Publish Application
        run: dotnet publish WileyWidget.WinForms/WileyWidget.WinForms.csproj --configuration Release --output ./publish --no-build

      - name: Validate Dashboard Deployment Package
        run: |
          if (!(Test-Path "./publish/WileyWidget.WinForms.exe")) {
            Write-Error "Dashboard executable not found in publish directory"
            exit 1
          }
          $size = (Get-Item "./publish/WileyWidget.WinForms.exe").Length / 1MB
          Write-Host "Dashboard executable size: $([math]::Round($size, 2)) MB"
          if ($size -gt 100) {
            Write-Warning "Dashboard executable exceeds 100MB - consider optimization"
          }

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wiley-widget-winforms
          path: ./publish/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/
          retention-days: 7
