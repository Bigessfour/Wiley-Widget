<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JARVIS - WileyWidget Assistant</title>
    <base href="/" />
    <link href="_framework/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link
      id="syncfusion-blazor-theme"
      href="_content/Syncfusion.Blazor.Themes/fluent2.css"
      rel="stylesheet"
    />
    <script
      src="_content/Syncfusion.Blazor.Core/scripts/syncfusion-blazor.min.js"
      type="text/javascript"
    ></script>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        background-color: #17181c;
        color: #f3f6fb;
      }

      body {
        margin: 0;
        overflow: hidden;
      }

      .loading-spinner {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        font-size: 18px;
        background-color: #17181c;
        color: #f3f6fb;
      }

      .loading-spinner::after {
        content: "";
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid currentColor;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spinner 0.6s linear infinite;
        margin-left: 10px;
      }

      @keyframes spinner {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loading-spinner">Loading JARVIS...</div>
    </div>

    <div
      id="blazor-error-ui"
      style="
        display: none;
        background-color: #b42318;
        color: #ffffff;
        padding: 20px;
        text-align: center;
        z-index: 9999;
      "
    >
      <h2>JARVIS Chat - Error</h2>
      <p>An error occurred while loading JARVIS. Please refresh the page.</p>
      <button
        onclick="location.reload()"
        style="padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold"
      >
        Reload
      </button>
    </div>

    <script src="_framework/blazor.webview.js"></script>
    <script src="app.js"></script>
    <script>
      window.addEventListener("load", function () {
        console.log("[JARVIS] Syncfusion JS bundle confirmed loaded");
      });

      window.addEventListener("beforeunload", function () {
        document.getElementById("app").innerHTML =
          '<div class="loading-spinner">Loading JARVIS...</div>';
      });
    </script>
  </body>
</html>
